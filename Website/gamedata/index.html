            const CANVAS_HEIGHT = 1152;
            const ASPECT_RATIO = CANVAS_WIDTH / CANVAS_HEIGHT;
            
            let audioUnlocked = false;
            let gameInitialized = false;
            
            // Global error handler to catch GameMaker runtime errors
            window.addEventListener('error', function(event) {
                // Check if it's a GameMaker-related error
                if (event.filename && event.filename.includes('Galaga.js')) {
                    console.warn('GameMaker runtime error caught:', event.message);

            // Handle unhandled promise rejections
            window.addEventListener('unhandledrejection', function(event) {
                if (event.reason && event.reason.message && event.reason.message.includes('unable to convert undefined')) {
                    console.warn('GameMaker audio error caught (non-fatal):', event.reason.message);
                    event.preventDefault(); // Prevent the error from being logged as unhandled
                }
            });
            
            // Unlock audio context on user interaction
            function unlockAudio() {
                if (audioUnlocked) return;
                
                try {
                    // Create a temporary audio context to unlock audio
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (AudioContext) {
                        const audioContext = new AudioContext();
                        if (audioContext.state === 'suspended') {
                            audioContext.resume();
                        }
                        
                        // Create and play a silent audio buffer to unlock audio
                        const buffer = audioContext.createBuffer(1, 1, 22050);
                        const source = audioContext.createBufferSource();

                        source.connect(audioContext.destination);

                        // Also try to unlock Web Audio API if GameMaker uses it

            function scaleCanvas() {
                const canvas = document.getElementById('canvas');
                if (!canvas) return;
                
                const viewportWidth = window.innerWidth;
                const viewportHeight = window.innerHeight;
                const viewportAspectRatio = viewportWidth / viewportHeight;
                
                let scale;
                if (viewportAspectRatio > ASPECT_RATIO) {

                    scale = viewportHeight / CANVAS_HEIGHT;
                } else {
                    // Viewport is taller than game, scale based on width
                    scale = viewportWidth / CANVAS_WIDTH;
                }
                
                // Apply scaling
                canvas.style.width = (CANVAS_WIDTH * scale) + 'px';
                canvas.style.height = (CANVAS_HEIGHT * scale) + 'px';
            }
